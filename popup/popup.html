<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=420">
  <title>Job Tracker AR</title>
  <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <div class="logo">JT</div>
      <h1>Job Tracker AR</h1>
    </div>

    <div class="capture-banner" id="captureBanner">
      <div><span class="label">Portal:</span> <strong id="detectedPortal">—</strong></div>
      <div><span class="label">Empresa:</span> <strong id="detectedCompany">—</strong></div>
      <div><span class="label">URL:</span> <span id="detectedUrl" style="font-size:11px;word-break:break-all;">—</span></div>
    </div>

    <div class="duplicate-alert" id="duplicateAlert">
      Ya tenés una postulación registrada para esta empresa
    </div>

    <form id="jobForm">
      <div class="form-row">
        <label for="empresa">Empresa *</label>
        <input type="text" id="empresa" required placeholder="Ej: Mercado Libre">
      </div>

      <div class="form-row">
        <label for="puesto">Puesto *</label>
        <input type="text" id="puesto" required placeholder="Ej: Software Engineer">
      </div>

      <div class="form-row-inline">
        <div class="form-row">
          <label for="portal">Portal</label>
          <select id="portal">
            <option value="indeed">Indeed</option>
            <option value="computrabajo">Computrabajo</option>
            <option value="bumeran">Bumeran</option>
            <option value="zonajobs">ZonaJobs</option>
            <option value="linkedin">LinkedIn</option>
            <option value="empleosit">Empleos IT</option>
            <option value="manual">Otro / Manual</option>
          </select>
        </div>
        <div class="form-row">
          <label for="remuneracion">Remuneración</label>
          <input type="text" id="remuneracion" placeholder="Ej: 250k ARS">
        </div>
      </div>

      <div class="form-row">
        <label for="descripcion">Descripción del puesto</label>
        <textarea id="descripcion" rows="3" placeholder="Copiá la descripción acá..."></textarea>
      </div>

      <div class="form-row-inline">
        <div class="form-row">
          <label for="cv_usado">CV usado</label>
          <input type="text" id="cv_usado" placeholder="Ej: CV_v2.pdf">
        </div>
        <div class="form-row">
          <label for="modalidad">Modalidad</label>
          <select id="modalidad">
            <option value="">—</option>
            <option value="remoto">Remoto</option>
            <option value="hibrido">Híbrido</option>
            <option value="presencial">Presencial</option>
          </select>
        </div>
      </div>

      <div class="form-row-inline">
        <div class="form-row">
          <label for="ubicacion">Ubicación</label>
          <input type="text" id="ubicacion" placeholder="Ej: CABA">
        </div>
        <div class="form-row">
          <label for="contacto">Contacto</label>
          <input type="text" id="contacto" placeholder="Nombre reclutador">
        </div>
      </div>

      <div class="form-row-inline">
        <div class="form-row">
          <label for="estado">Estado *</label>
          <select id="estado" required>
            <option value="guardado">Guardado</option>
            <option value="postulado">Postulado</option>
            <option value="entrevistado">Entrevistado</option>
            <option value="rechazado">Rechazado</option>
            <option value="sin_respuesta">Sin respuesta</option>
          </select>
        </div>
        <div class="form-row">
          <label for="url">URL de la oferta</label>
          <input type="url" id="url" placeholder="https://...">
        </div>
      </div>

      <div class="form-row">
        <label for="nota">Nota</label>
        <textarea id="nota" rows="2" placeholder="Cualquier comentario adicional..."></textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary" id="btnGuardar">Guardar postulación</button>
        <button type="button" class="btn-secondary" id="btnLimpiar">Limpiar</button>
      </div>
    </form>

    <div class="recent-section">
      <div class="recent-header">
        <h2>Últimas postulaciones</h2>
        <span class="recent-link" id="btnDashboard">Ver Dashboard →</span>
      </div>
      <div id="recentList">
        <div class="empty-state">Todavía no hay postulaciones</div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
